<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G5 Shares Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:#020617;
border-bottom:1px solid #1e293b;
}

.logo{
font-size:22px;
font-weight:bold;
color:#22c55e;
}

.wallet{
background:#020617;
margin:20px;
padding:20px;
border-radius:10px;
}

.wallet h2{
margin:0;
color:#22c55e;
}

.actions button{
margin:5px;
padding:8px 14px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
cursor:pointer;
}

.section-title{
margin-left:20px;
margin-top:40px;
font-size:20px;
}

.plans{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.plan-card{
background:#020617;
border-radius:12px;
overflow:hidden;
border:1px solid #1e293b;
}

.plan-card img{
width:100%;
height:140px;
object-fit:cover;
}

.plan-content{
padding:15px;
}

.roi{
color:#22c55e;
font-weight:bold;
}

.plan-content button{
margin-top:10px;
width:100%;
padding:10px;
border:none;
background:#22c55e;
color:white;
border-radius:6px;
cursor:pointer;
}

#my-investments{
padding:20px;
}

.user-investment{
background:#020617;
padding:15px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #1e293b;
}

.claim-btn{
margin-top:10px;
background:#22c55e;
border:none;
padding:8px 12px;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">

<div class="logo">
G5 SHARES
</div>

<div>
<span id="userName">User</span>
</div>

</div>


<!-- WALLET -->

<div class="wallet">

<h2 id="balance">$0</h2>

<p>User ID: <span id="userID"></span></p>

<div class="actions">

<button onclick="window.location.href='wallet.html'">
Wallet
</button>

<button onclick="window.location.href='transactions.html'">
Transactions
</button>

<button onclick="logout()">
Logout
</button>

</div>

</div>


<h2 class="section-title">Investment Plans</h2>

<div id="plans-container" class="plans"></div>


<h2 class="section-title">My Investments</h2>

<div id="my-investments"></div>



<script type="module">

import {
account,
databases,
DATABASE_ID,
COLLECTION_WALLETS
} from "./js/appwrite.js";

import {
invest,
loadUserInvestments,
logout
} from "./js/invest.js";


const PLANS=[

{name:"STARTER MICRO PLAN",amount:200,roi:90,duration:3,img:"images/starter.jpg"},

{name:"PREMIUM FAST PLAN",amount:700,roi:70,duration:5,img:"images/premium.jpg"},

{name:"ANDERSON SOUTH CAROLINA",amount:5000,roi:20,duration:7,img:"images/agriculture.jpg"},

{name:"Michigan USA",amount:10000,roi:30,duration:10,img:"images/crypto.jpg"},

{name:"GOLD",amount:25000,roi:40,duration:15,img:"images/gold.jpg"},

{name:"LEKKI LAGOS",amount:50000,roi:50,duration:20,img:"images/realestate.jpg"},

{name:"SOUTH AFRICA PLATINUM",amount:100000,roi:70,duration:30,img:"images/southafrica.jpg"},

{name:"DANGOTE TRUCKS",amount:60000,roi:100,duration:45,img:"images/stocks.jpg"},

{name:"AA RANO TRUCKS-SHARES",amount:75000,roi:55,duration:25,img:"images/aarano.jpg"},

{name:"ADRON HOMES",amount:90000,roi:60,duration:28,img:"images/adron.jpg"},

{name:"ZENITH BANK SHARES FUND",amount:120000,roi:80,duration:35,img:"images/zenith.jpg"},

{name:"RAW-GOLD",amount:150000,roi:90,duration:40,img:"images/rawgold.jpg"}

];


function formatUSD(n){
return new Intl.NumberFormat("en-US",{style:"currency",currency:"USD"}).format(n);
}



/* LOAD USER + WALLET */

async function loadUser(){

try{

const user = await account.get();

document.getElementById("userName").innerText=user.name;
document.getElementById("userID").innerText=user.$id;


/* LOAD WALLET BALANCE */

const walletRes = await databases.listDocuments(
DATABASE_ID,
COLLECTION_WALLETS
);

const wallet = walletRes.documents.find(
w => w.userId === user.$id
);

if(wallet){

document.getElementById("balance").innerText =
formatUSD(wallet.balance);

}else{

document.getElementById("balance").innerText="$0";

}

}catch(err){

window.location.href="login.html";

}

}



/* LOAD PLANS */

function loadPlans(){

const container=document.getElementById("plans-container");

PLANS.forEach(plan=>{

const card=document.createElement("div");

card.className="plan-card";

card.innerHTML=`

<img src="${plan.img}">

<div class="plan-content">

<h3>${plan.name}</h3>

<p>Investment: ${formatUSD(plan.amount)}</p>

<p class="roi">${plan.roi}% ROI</p>

<p>Duration: ${plan.duration} days</p>

<button onclick="invest(${plan.amount},${plan.roi},${plan.duration},'${plan.name}')">
Invest
</button>

</div>
`;

container.appendChild(card);

});

}



loadUser();
loadPlans();
loadUserInvestments();

</script>

</body>
</html>
