<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>G5 Real Estate & Shares Holders</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:#020617;
border-bottom:1px solid #1e293b;
}

.logo{
font-size:22px;
font-weight:bold;
color:#22c55e;
}

/* WALLET */

.wallet{
background:#020617;
margin:20px;
padding:20px;
border-radius:10px;
}

.wallet h2{
margin:0;
color:#22c55e;
}

/* BUTTONS */

.actions button{
margin:5px;
padding:8px 14px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
cursor:pointer;
}

/* FEEDS */

.feed-box{
background:#020617;
margin:20px;
padding:15px;
border-radius:10px;
border:1px solid #1e293b;
}

.feed-item{
padding:8px;
font-size:14px;
border-bottom:1px solid #1e293b;
color:#94a3b8;
}

.feed-item span{
color:#22c55e;
font-weight:bold;
}

/* LEADERBOARD */

.leaderboard{
background:#020617;
margin:20px;
padding:15px;
border-radius:10px;
border:1px solid #1e293b;
}

.leaderboard-item{
display:flex;
justify-content:space-between;
padding:8px;
border-bottom:1px solid #1e293b;
}

/* PLANS */

.section-title{
margin-left:20px;
margin-top:40px;
font-size:20px;
}

.plans{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.plan-card{
background:#020617;
border-radius:12px;
overflow:hidden;
border:1px solid #1e293b;
transition:0.3s;
}

.plan-card:hover{
transform:translateY(-5px);
}

.plan-card img{
width:100%;
height:140px;
object-fit:cover;
}

.plan-content{
padding:15px;
}

.roi{
color:#22c55e;
font-weight:bold;
}

.plan-content button{
margin-top:10px;
width:100%;
padding:10px;
border:none;
background:#22c55e;
color:white;
border-radius:6px;
cursor:pointer;
}

/* INVESTMENTS */

#my-investments{
padding:20px;
}

.user-investment{
background:#020617;
padding:15px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #1e293b;
}

.claim-btn{
margin-top:10px;
background:#22c55e;
border:none;
padding:8px 12px;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">

<div class="logo">
PVPWIN INVESTMENT
</div>

<div>
<span id="userName">Investor</span>
</div>

</div>

<!-- WALLET -->

<div class="wallet">

<h2 id="balance">$0</h2>

<p>User ID: <span id="userID">001</span></p>

<div class="actions">

<button>Wallet</button>

<button>Transactions</button>

<button onclick="logout()">Logout</button>

</div>

</div>

<!-- INVESTMENT FEED -->

<div class="feed-box">

<h3>Recent Investments</h3>

<div id="investment-feed"></div>

</div>

<!-- WITHDRAWAL FEED -->

<div class="feed-box">

<h3>Recent Withdrawals</h3>

<div id="withdrawal-feed"></div>

</div>

<!-- LEADERBOARD -->

<div class="leaderboard">

<h3>Top Investors</h3>

<div id="leaderboard-list"></div>

</div>

<!-- PLANS -->

<h2 class="section-title">
Investment Plans
</h2>

<div id="plans-container" class="plans"></div>

<h2 class="section-title">
My Investments
</h2>

<div id="my-investments"></div>

<script>

/* WALLET */

let walletBalance = Number(localStorage.getItem("walletBalance")) || 0;

document.getElementById("balance").innerText = formatUSD(walletBalance);

/* USER */

const userName = localStorage.getItem("userName") || "Investor";
const userID = localStorage.getItem("userID") || "user001";

document.getElementById("userName").innerText = userName;
document.getElementById("userID").innerText = userID;

/* PLAN RESTRICTIONS */

const PLAN_ACCESS = {

"DANGOTE TRUCKS":{
allowedUsers:["adminUserId"]
},

"RAW-GOLD":{
allowedUsers:["VIPUser"]
}

};

/* PLANS */

const PLANS=[

{name:"STARTER MICRO PLAN",amount:200,roi:90,duration:3,img:"https://picsum.photos/300/200?1"},
{name:"PREMIUM FAST PLAN",amount:700,roi:70,duration:5,img:"https://picsum.photos/300/200?2"},
{name:"ANDERSON SOUTH CAROLINA",amount:5000,roi:20,duration:7,img:"https://picsum.photos/300/200?3"},
{name:"Michigan USA",amount:10000,roi:30,duration:10,img:"https://picsum.photos/300/200?4"},
{name:"GOLD",amount:25000,roi:40,duration:15,img:"https://picsum.photos/300/200?5"},
{name:"LEKKI LAGOS",amount:50000,roi:50,duration:20,img:"https://picsum.photos/300/200?6"},
{name:"SOUTH AFRICA PLATINUM",amount:100000,roi:70,duration:30,img:"https://picsum.photos/300/200?7"},
{name:"DANGOTE TRUCKS",amount:60000,roi:100,duration:45,img:"https://picsum.photos/300/200?8"},
{name:"AA RANO TRUCKS-SHARES",amount:75000,roi:55,duration:25,img:"https://picsum.photos/300/200?9"},
{name:"ADRON HOMES",amount:90000,roi:60,duration:28,img:"https://picsum.photos/300/200?10"},
{name:"ZENITH BANK SHARES FUND",amount:120000,roi:80,duration:35,img:"https://picsum.photos/300/200?11"},
{name:"RAW-GOLD",amount:150000,roi:90,duration:40,img:"https://picsum.photos/300/200?12"}

];

/* INVESTMENTS */

let investments = JSON.parse(localStorage.getItem("investments")) || [];

/* FORMAT USD */

function formatUSD(n){

return new Intl.NumberFormat("en-US",{
style:"currency",
currency:"USD"
}).format(n);

}

/* LOAD PLANS */

function loadPlans(){

const container = document.getElementById("plans-container");

PLANS.forEach(plan=>{

const card=document.createElement("div");

card.className="plan-card";

card.innerHTML=`

<img src="${plan.img}">

<div class="plan-content">

<h3>${plan.name}</h3>

<p>Investment: ${formatUSD(plan.amount)}</p>

<p class="roi">${plan.roi}% ROI</p>

<p>Duration: ${plan.duration} days</p>

<button onclick="invest('${plan.name}')">Invest</button>

</div>

`;

container.appendChild(card);

});

}

/* INVEST FUNCTION */

function invest(planName){

if(PLAN_ACCESS[planName]){

const allowed = PLAN_ACCESS[planName].allowedUsers;

if(!allowed.includes(userID)){

alert("This plan is restricted.");

return;

}

}

const plan = PLANS.find(p=>p.name===planName);

const start = Date.now();

const end = start + (plan.duration*24*60*60*1000);

investments.push({

name:plan.name,
amount:plan.amount,
roi:plan.roi,
start:start,
end:end

});

localStorage.setItem("investments",JSON.stringify(investments));

renderInvestments();

}

/* RENDER INVESTMENTS */

function renderInvestments(){

const container = document.getElementById("my-investments");

container.innerHTML="";

investments.forEach((inv,index)=>{

const profit = inv.amount*(inv.roi/100);

const card=document.createElement("div");

card.className="user-investment";

card.innerHTML=`

<h3>${inv.name}</h3>

<p>Investment: ${formatUSD(inv.amount)}</p>

<p>ROI: ${inv.roi}%</p>

<p>Profit: ${formatUSD(profit)}</p>

<p>Time Remaining: <span id="timer${index}"></span></p>

<button id="claim${index}" class="claim-btn" style="display:none">Claim Profit</button>

`;

container.appendChild(card);

startCountdown(inv,index);

});

}

/* ROI COUNTDOWN */

function startCountdown(inv,index){

const timer=document.getElementById("timer"+index);

const claimBtn=document.getElementById("claim"+index);

function update(){

const now = Date.now();

const diff = inv.end - now;

if(diff<=0){

timer.innerText="ROI Ready";

claimBtn.style.display="block";

claimBtn.onclick=()=>claimProfit(inv,index);

return;

}

const d=Math.floor(diff/(1000*60*60*24));
const h=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
const m=Math.floor((diff%(1000*60*60))/(1000*60));

timer.innerText = d+"d "+h+"h "+m+"m";

}

update();

setInterval(update,60000);

}

/* CLAIM PROFIT */

function claimProfit(inv,index){

const profit = inv.amount*(inv.roi/100);

if(!confirm("Claim "+formatUSD(profit)+" profit?")) return;

walletBalance += profit;

localStorage.setItem("walletBalance",walletBalance);

document.getElementById("balance").innerText = formatUSD(walletBalance);

investments.splice(index,1);

localStorage.setItem("investments",JSON.stringify(investments));

renderInvestments();

}

/* LOGOUT */

function logout(){

localStorage.clear();
location.reload();

}

/* INIT */

loadPlans();
renderInvestments();

</script>

</body>
</html>
