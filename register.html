<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Register</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="stylesheet" href="css/style.css" />

<style>

/* Page layout */

body{
font-family:Arial, sans-serif;
background:#0b0b12;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
overflow:hidden;
}

/* GOLDEN G5 BACKGROUND */

.g5-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
overflow:hidden;
}

.g5{
position:absolute;
font-size:90px;
font-weight:bold;
background:linear-gradient(45deg,#FFD700,#ffb300,#fff4b0);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
opacity:0.15;
animation:float 20s linear infinite;
}

.g5:nth-child(1){left:10%; top:90%; animation-duration:18s;}
.g5:nth-child(2){left:30%; top:95%; animation-duration:22s;}
.g5:nth-child(3){left:50%; top:92%; animation-duration:25s;}
.g5:nth-child(4){left:70%; top:94%; animation-duration:19s;}
.g5:nth-child(5){left:85%; top:97%; animation-duration:24s;}
.g5:nth-child(6){left:20%; top:96%; animation-duration:27s;}

@keyframes float{
0%{
transform:translateY(0) rotate(0deg);
opacity:0;
}

20%{
opacity:0.25;
}

100%{
transform:translateY(-120vh) rotate(360deg);
opacity:0;
}
}

/* AUTH FORM */

.auth-container{
background:#1e1e30;
padding:30px;
border-radius:12px;
text-align:center;
width:320px;
box-shadow:0 0 25px rgba(0,0,0,0.6);
}

.auth-container input{
display:block;
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:none;
}

.auth-container button{
width:100%;
padding:10px;
border:none;
border-radius:5px;
background:#d4af37;
color:#000;
cursor:pointer;
position:relative;
font-weight:bold;
}

.auth-container button:disabled{
opacity:0.7;
cursor:not-allowed;
}

.spinner{
border:2px solid #f3f3f3;
border-top:2px solid #fff;
border-radius:50%;
width:14px;
height:14px;
animation:spin 1s linear infinite;
display:inline-block;
vertical-align:middle;
margin-left:5px;
}

.hidden{display:none;}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

a{color:#FFD700;text-decoration:none;}
a:hover{text-decoration:underline;}

.message{
margin-top:12px;
font-weight:600;
color:#facc15;
}

.success{
color:#4ade80;
}

</style>
</head>

<body>

<!-- Golden animated background -->
<div class="g5-bg">
<div class="g5">G5</div>
<div class="g5">G5</div>
<div class="g5">G5</div>
<div class="g5">G5</div>
<div class="g5">G5</div>
<div class="g5">G5</div>
</div>

<div class="auth-container">
<h2>Create Account</h2>

<input id="name" type="text" placeholder="Full Name" required />
<input id="email" type="email" placeholder="Email" required />
<input id="password" type="password" placeholder="Password" required />

<button id="registerBtn" type="button">
<span class="btn-text">Register</span>
<span class="spinner hidden"></span>
</button>

<p>
Already have an account? <a href="login.html">Login</a>
</p>

<p id="formMessage" class="message"></p>
</div>

<script type="module">
import { account, databases, ID, DATABASE_ID, COLLECTION_WALLETS, COLLECTION_REFERRALS } from './js/appwrite.js';

const btn = document.getElementById('registerBtn');
const msg = document.getElementById('formMessage');

const urlParams = new URLSearchParams(window.location.search);
const referralId = urlParams.get('ref');

btn.addEventListener('click', async () => {

msg.textContent='';
msg.classList.remove('success');

const name=document.getElementById('name').value.trim();
const email=document.getElementById('email').value.trim();
const password=document.getElementById('password').value;

if(!name||!email||!password){
msg.textContent='All fields are required';
return;
}

btn.disabled=true;
btn.querySelector('.btn-text').innerText='Registering...';
btn.querySelector('.spinner').classList.remove('hidden');

try{

const newUser=await account.create(ID.unique(),email,password,name);

await account.createEmailSession(email,password);

await databases.createDocument(DATABASE_ID,COLLECTION_WALLETS,ID.unique(),{
userId:newUser.$id,
balance:0,
createdAt:new Date()
});

if(referralId){
await databases.createDocument(DATABASE_ID,COLLECTION_REFERRALS,ID.unique(),{
referredBy:referralId,
referredUser:newUser.$id,
bonus:300,
status:'pending',
createdAt:new Date()
});
}

msg.textContent='Registration successful! Redirecting...';
msg.classList.add('success');

setTimeout(()=>{
window.location.href='dashboard.html';
},2500);

}catch(error){

console.error(error);
msg.textContent=error.message||'Registration failed';

}finally{

btn.disabled=false;
btn.querySelector('.btn-text').innerText='Register';
btn.querySelector('.spinner').classList.add('hidden');

}

});
</script>

</body>
</html>
