<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wallet Dashboard</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px;
}

h2,h3{
color:#22c55e;
}

.guidelines{
background:#020617;
padding:15px;
border-radius:8px;
margin-bottom:20px;
}

.balance{
font-size:24px;
font-weight:bold;
margin-bottom:20px;
}

button{
padding:12px 18px;
margin:6px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

#requestFundBtn{background:#22c55e;color:white;}
#depositBtn{background:#10b981;color:white;}
#withdrawBtn{background:#f59e0b;color:white;}
#dashboardBtn{background:#6366f1;color:white;}
#bankBtn{background:#8b5cf6;color:white;}
#updateBankBtn{background:#7c3aed;color:white;}
#supportBtn{background:#0284c7;color:white;}
#logoutBtn{background:#ef4444;color:white;}

.section{
margin-top:30px;
}

.pending-request{
background:#020617;
padding:12px;
border-radius:6px;
margin-bottom:10px;
border:1px solid #1e293b;
}

</style>

</head>

<body>

<h2>Wallet Dashboard</h2>

<div class="guidelines">

<h3>Guidelines</h3>

<ul>
<li>Fund wallet by sending request to admin</li>
<li>Deposit crypto after funding approval</li>
<li>Minimum withdrawal $700</li>
<li>Claim ROI once investment matures</li>
</ul>

</div>

<div class="balance">
Wallet Balance:
<span id="walletBalance">Loading...</span>
</div>


<div class="section">

<button id="requestFundBtn">FUND WALLET</button>

<button id="depositBtn">DEPOSIT VIA CRYPTO</button>

<button id="withdrawBtn">Withdraw (Min $700)</button>

<button id="dashboardBtn">Back to Dashboard</button>

<button id="bankBtn">Bank Deposit</button>

<button id="updateBankBtn">Update Bank Details</button>

</div>


<div class="section">

<h3>Pending Requests</h3>

<div id="pendingRequests">Loading...</div>

</div>


<div class="section">

<h3>Matured Investments</h3>

<div id="maturedInvestments"></div>

</div>


<div class="section">

<button id="supportBtn">Contact Support</button>

<button id="logoutBtn">Logout</button>

</div>


<script type="module">

import {
account,
databases,
ID,
DATABASE_ID,
COLLECTION_WALLETS
} from "./js/appwrite.js";


async function initializeWallet(){

try{

const user = await account.get();

let walletRes = await databases.listDocuments(
DATABASE_ID,
COLLECTION_WALLETS
);

let wallet = walletRes.documents.find(
w => w.userId === user.$id
);


/* AUTO CREATE WALLET */

if(!wallet){

wallet = await databases.createDocument(
DATABASE_ID,
COLLECTION_WALLETS,
ID.unique(),
{
userId:user.$id,
balance:0,
createdAt:new Date().toISOString()
}
);

alert("Wallet created successfully for your account.");

}


/* SHOW BALANCE */

document.getElementById("walletBalance").innerText =
`$${wallet.balance}`;


/* NO PENDING REQUESTS DEFAULT */

document.getElementById("pendingRequests").innerText =
"No pending requests";

}catch(err){

console.error(err);

alert(
"Wallet balance failed to load.\n\nPossible reasons:\n\n1. Wallet collection permission blocked\n2. Wallet row not created\n3. Appwrite network error\n4. Database attribute mismatch"
);

document.getElementById("walletBalance").innerText="Error";

}

}



/* BUTTON ACTIONS */

document.getElementById("depositBtn").onclick=()=>{
window.location.href="coin.html";
};

document.getElementById("dashboardBtn").onclick=()=>{
window.location.href="dashboard.html";
};

document.getElementById("bankBtn").onclick=()=>{
window.open("https://t.me/pvpwin_invest","_blank");
};

document.getElementById("updateBankBtn").onclick=()=>{
window.location.href="bank.html";
};

document.getElementById("supportBtn").onclick=()=>{
window.open("https://t.me/pvpwin_invest","_blank");
};

document.getElementById("logoutBtn").onclick=async()=>{

await account.deleteSession("current");

window.location.href="login.html";

};


/* LOAD WALLET */

window.addEventListener("DOMContentLoaded",initializeWallet);

</script>

</body>
</html>
